<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI寒冬裁员生存模拟器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --cyan:#00ffcc;--blue:#0099ff;--red:#ff3366;--yellow:#ffcc00;
  --purple:#9933ff;--orange:#ff9900;--green:#00cc66;--gold:#ffd700;
  --bg:#0a0a1a;--card:rgba(15,15,40,0.97);--txt:#e0e0ff;--dim:rgba(224,224,255,0.6);
}
html,body{background:var(--bg);color:var(--txt);font-family:'PingFang SC','Helvetica Neue',sans-serif;min-height:100vh;overflow-x:hidden}
.wrap{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg)}

/* ---- 通用 ---- */
.page{display:none}
.page.on{display:block}
.card{background:var(--card);border:1px solid rgba(0,255,204,.2);border-radius:14px;padding:16px;margin-bottom:12px}
.btn{display:block;width:100%;padding:15px;border-radius:10px;font-size:15px;font-weight:700;text-align:center;border:none;cursor:pointer;outline:none;transition:opacity .15s,transform .1s;-webkit-appearance:none;margin-bottom:0}
.btn:active{opacity:.75;transform:scale(.97)}
.bp{background:linear-gradient(135deg,#00ffcc,#0099ff);color:#0a0a1a}
.bg-{background:transparent;border:2px solid rgba(0,255,204,.4);color:#00ffcc}
.bd{background:linear-gradient(135deg,#ff3366,#cc0033);color:#fff}
.bx{background:rgba(255,255,255,.07);color:rgba(255,255,255,.3);cursor:not-allowed}
.neon{color:#00ffcc;text-shadow:0 0 8px #00ffcc}
.nred{color:#ff3366;text-shadow:0 0 6px #ff3366}
.nyel{color:#ffcc00}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,204,.3),transparent);margin:12px 0}
.pbar{flex:1;height:9px;border-radius:5px;background:rgba(255,255,255,.1);overflow:hidden}
.pfill{height:100%;border-radius:5px;transition:width .4s}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;margin:2px;border:1px solid}
.tc{background:rgba(0,255,204,.1);border-color:rgba(0,255,204,.4);color:#00ffcc}
.tr{background:rgba(255,51,102,.1);border-color:rgba(255,51,102,.4);color:#ff3366}
.ty{background:rgba(255,204,0,.1);border-color:rgba(255,204,0,.4);color:#ffcc00}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 2s infinite}
@keyframes glitch{0%,90%,100%{transform:translateX(0)}92%{transform:translateX(-3px)}94%{transform:translateX(3px)}96%{transform:translateX(-2px)}}
.glitch{animation:glitch 3s infinite}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadein .3s ease forwards}

/* ---- 首页 ---- */
#pg-home{
  background:radial-gradient(ellipse at 50% 20%,rgba(0,255,204,.07) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 80%,rgba(153,51,255,.07) 0%,transparent 60%),var(--bg);
  min-height:100vh;flex-direction:column;align-items:center;justify-content:center
}
#pg-home.on{display:flex}
.home-inner{padding:32px 24px;width:100%;text-align:center}
.home-logo{font-size:68px;margin-bottom:6px}
.home-title{font-size:24px;font-weight:900;color:#fff;letter-spacing:1px;margin-bottom:4px}
.home-sub{font-size:13px;color:rgba(0,255,204,.7);margin-bottom:6px}
.home-desc{font-size:12px;color:var(--dim);line-height:1.7;margin-bottom:24px}
.home-badges{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;margin-bottom:28px}
.home-badges span{background:rgba(0,255,204,.1);border:1px solid rgba(0,255,204,.3);border-radius:20px;padding:3px 10px;color:#00ffcc;font-size:12px}
.home-btns{display:flex;flex-direction:column;gap:10px}
.home-footer{margin-top:24px;font-size:11px;color:rgba(224,224,255,.2);line-height:2}

/* ---- 角色创建 ---- */
#pg-create{padding:14px 14px 100px}
.ph{margin-bottom:16px}
.pt{font-size:21px;font-weight:900;color:#00ffcc;text-shadow:0 0 10px #00ffcc;display:block}
.ps{font-size:13px;color:var(--dim)}
.stitle{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.si{font-size:17px}
.sl{font-size:15px;font-weight:700;color:#fff}
.ptbar{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 0;margin-bottom:10px}
.ptlbl{font-size:14px;color:var(--dim)}
.ptval{font-size:34px;font-weight:900}
.ptunit{font-size:14px;color:var(--dim)}
/* 难度 */
.drow{display:flex;gap:8px;margin-bottom:0}
.ditem{flex:1;text-align:center;padding:10px 4px;border:2px solid rgba(255,255,255,.1);border-radius:10px;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.03)}
.ditem.sel{border-color:#00ffcc;background:rgba(0,255,204,.08)}
.ditem.selh{border-color:#ff3366!important;background:rgba(255,51,102,.08)!important}
.de{font-size:20px;display:block;margin-bottom:2px}
.dn{font-size:12px;font-weight:700;color:#fff;display:block}
.dp{font-size:11px;color:#00ffcc;display:block}
.dd{font-size:10px;color:var(--dim);display:block}
/* 出身 */
.tg{margin-bottom:14px}
.gn{font-size:13px;color:var(--dim);display:block;margin-bottom:7px}
.tlist{display:flex;flex-direction:column;gap:7px}
.oi{padding:11px 13px;border:1px solid rgba(255,255,255,.1);border-radius:10px;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.02)}
.oi.sel{border-color:#00ffcc;background:rgba(0,255,204,.06)}
.oi.dis{opacity:.4;cursor:not-allowed}
.oh{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.on{font-size:14px;font-weight:700;color:#fff}
.oc{font-size:13px;font-weight:700;color:#ff3366}
.oc.free{color:#00cc66}
.od{font-size:12px;color:var(--dim);display:block;margin-bottom:2px}
.oe{font-size:11px;color:#00ffcc;display:block}
/* 天赋 */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ti{padding:10px 8px;border:1px solid rgba(255,255,255,.1);border-radius:10px;cursor:pointer;transition:all .2s;text-align:center;background:rgba(255,255,255,.02)}
.ti.sel{border-color:#00ffcc!important;background:rgba(0,255,204,.12)!important;box-shadow:0 0 16px rgba(0,255,204,.25)!important;transform:scale(1.02)}
.ti.dis{opacity:.4;cursor:not-allowed}
.te{font-size:20px;display:block;margin-bottom:2px}
.tn{font-size:12px;font-weight:700;color:#fff;display:block}
.tco{font-size:11px;color:#ff3366;display:block}
.tef{font-size:10px;color:var(--dim);display:block;margin-top:3px;line-height:1.4}
/* 属性预览 */
.ar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.al{font-size:12px;color:var(--dim);width:88px;flex-shrink:0}
.av{font-size:13px;font-weight:700;width:36px;text-align:right;flex-shrink:0}

/* ---- 游戏主界面 ---- */
#pg-game{padding:12px 12px 100px}
.sbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;margin-bottom:12px;background:rgba(0,255,204,.04);border:1px solid rgba(0,255,204,.15);border-radius:10px}
.dinfo{display:flex;align-items:baseline;gap:2px}
.dlbl{font-size:13px;color:var(--dim)}
.dnum{font-size:38px;font-weight:900;color:#00ffcc;line-height:1;text-shadow:0 0 12px rgba(0,255,204,.6)}
.dsl{font-size:12px;color:rgba(224,224,255,.3)}
.sbadge{display:flex;align-items:center;gap:5px;padding:5px 13px;border-radius:20px;border:1px solid}
.sm{border-color:#ffcc00;background:rgba(255,204,0,.1)}
.sa{border-color:#ff9900;background:rgba(255,153,0,.1)}
.sn{font-size:13px;font-weight:700}
.sbtn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(255,255,255,.05);border-radius:50%;border:1px solid rgba(255,255,255,.1);cursor:pointer}
.agrid{display:flex;flex-direction:column;gap:7px}
.arow{display:flex;align-items:center;gap:6px}
.arow.warn .aname,.arow.warn .anum{color:#ff3366}
.aicon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.aname{font-size:12px;color:var(--dim);width:72px;flex-shrink:0}
.anum{font-size:13px;font-weight:700;width:32px;text-align:right;flex-shrink:0}
.wbox{margin-bottom:10px}
.wi{background:rgba(255,51,102,.1);border:1px solid rgba(255,51,102,.35);border-radius:6px;padding:8px 12px;margin-bottom:6px;font-size:13px;color:#ff3366;font-weight:700}
.brow{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.atip{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.atxt{font-size:16px;font-weight:700;color:#fff}
.asub{font-size:13px;color:var(--dim)}
.ctabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px}
.ctabs::-webkit-scrollbar{display:none}
.ctab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:13px;border:1px solid rgba(255,255,255,.15);color:rgba(224,224,255,.55);cursor:pointer;transition:all .2s;white-space:nowrap;background:none}
.ctab.on{font-weight:700}
.alist{display:flex;flex-direction:column;gap:10px}
.ait{padding:13px;cursor:pointer;transition:all .15s;margin-bottom:0}
.ait:active{transform:scale(.97);opacity:.85}
.aih{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.aie{font-size:20px}
.ain{font-size:14px;font-weight:700;color:#fff;flex:1}
.aibadge{background:rgba(255,51,102,.15);border:1px solid rgba(255,51,102,.35);border-radius:12px;padding:2px 8px;font-size:11px;color:#ff3366;flex-shrink:0}
.aid{font-size:12px;color:var(--dim);line-height:1.6;margin-bottom:7px}
.aieffs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.ep{font-size:11px;padding:2px 8px;border-radius:12px;background:rgba(0,204,102,.1);border:1px solid rgba(0,204,102,.3);color:#00cc66}
.en{font-size:11px;padding:2px 8px;border-radius:12px;background:rgba(255,51,102,.15);border:1px solid rgba(255,51,102,.4);color:#ff3366;font-weight:700}
.risk{font-size:11px;color:#ff9900}

/* ---- 弹层 ---- */
.overlay{position:fixed;top:0;left:50%;transform:translateX(-50%);width:430px;max-width:100vw;height:100vh;background:rgba(8,8,20,.93);display:flex;align-items:center;justify-content:center;padding:24px 16px;z-index:200;overflow-y:auto}
.ov-inner{width:100%;max-height:88vh;overflow-y:auto}
.ov-card{background:linear-gradient(135deg,rgba(15,15,42,.99),rgba(10,10,26,.99));border:2px solid rgba(0,255,204,.35);border-radius:16px;padding:22px;box-shadow:0 0 60px rgba(0,255,204,.15)}
.evhd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px}
.evt{font-size:17px;font-weight:900;color:#fff;flex:1;line-height:1.4}
.evtag{flex-shrink:0;padding:3px 10px;border-radius:14px;font-size:11px}
.evf{background:rgba(255,204,0,.12);border:1px solid rgba(255,204,0,.35);color:#ffcc00}
.evr{background:rgba(0,153,255,.12);border:1px solid rgba(0,153,255,.35);color:#0099ff}
.evdesc{font-size:14px;color:rgba(224,224,255,.85);line-height:1.8;margin-bottom:16px;display:block}
.evopts{display:flex;flex-direction:column;gap:10px}
.evopt{display:flex;align-items:flex-start;gap:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:13px;cursor:pointer;transition:all .2s}
.evopt:active{border-color:#00ffcc;background:rgba(0,255,204,.07)}
.evoem{font-size:20px;flex-shrink:0}
.evoc{flex:1}
.evotxt{font-size:14px;font-weight:700;color:#fff;display:block;margin-bottom:4px}
.evoeffs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:3px}
.evoep{font-size:11px;padding:2px 7px;border-radius:10px;background:rgba(0,204,102,.1);border:1px solid rgba(0,204,102,.3);color:#00cc66}
.evoen{font-size:11px;padding:2px 7px;border-radius:10px;background:rgba(255,51,102,.15);border:1px solid rgba(255,51,102,.4);color:#ff3366;font-weight:700}
.evork{font-size:11px;color:#ff9900;display:block}
/* 结果弹层 */
.restit{font-size:13px;color:var(--dim);display:block;margin-bottom:3px}
.resact{font-size:20px;font-weight:900;color:#fff;display:block;margin-bottom:5px}
.resdesc{font-size:13px;color:var(--dim);line-height:1.7;display:block;margin-bottom:12px}
.effslist{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.efc{display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:12px;font-size:12px}
.efc.pos{background:rgba(0,204,102,.1);border:1px solid rgba(0,204,102,.35);color:#00cc66}
.efc.neg{background:rgba(255,51,102,.1);border:1px solid rgba(255,51,102,.35);color:#ff3366}
.efcl{color:rgba(224,224,255,.6)}
.efcv{font-weight:700}
.riskalert{display:flex;align-items:flex-start;gap:10px;background:rgba(255,153,0,.1);border:1px solid rgba(255,153,0,.35);border-radius:8px;padding:11px;margin-bottom:11px;font-size:13px;color:#ff9900}
.logbox{background:rgba(0,255,204,.04);border:1px solid rgba(0,255,204,.18);border-radius:8px;padding:10px 13px;margin-bottom:11px}
.logitem{font-size:12px;color:#00ffcc;display:block;padding:2px 0}

/* ---- 结局页 ---- */
#pg-result{padding:20px 16px 60px}
.rdeco{text-align:center;font-size:11px;color:rgba(0,255,204,.3);letter-spacing:4px;margin-bottom:12px;font-family:monospace}
.retag{display:inline-block;padding:5px 16px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:14px}
.ef{background:rgba(255,51,102,.15);border:1px solid rgba(255,51,102,.4);color:#ff3366}
.en2{background:rgba(0,153,255,.15);border:1px solid rgba(0,153,255,.4);color:#0099ff}
.ep2{background:rgba(255,204,0,.15);border:1px solid rgba(255,204,0,.4);color:#ffcc00}
.eh{background:rgba(0,255,204,.15);border:1px solid rgba(0,255,204,.4);color:#00ffcc}
.remain{text-align:center;margin-bottom:18px}
.rebig{font-size:78px;display:block;margin-bottom:6px}
.retitle{font-size:25px;font-weight:900;color:#fff;display:block}
.redes{font-size:14px;color:rgba(224,224,255,.9);line-height:1.9;display:block}
.resub{font-size:13px;color:#00ffcc;font-style:italic;display:block}
.stlbl{font-size:14px;font-weight:700;color:var(--dim);display:block;margin-bottom:10px}
.strow{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.stic{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.stn{font-size:12px;color:var(--dim);width:72px;flex-shrink:0}
.stv{font-size:13px;font-weight:700;width:32px;text-align:right;flex-shrink:0}
.actl{font-size:14px;font-weight:700;color:var(--dim);display:block;margin-bottom:8px}
.acit{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ace{font-size:20px}
.acn{font-size:14px;font-weight:700;color:#fff;display:block}
.acd{font-size:12px;color:var(--dim)}
.mstgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mst{background:rgba(255,255,255,.03);border-radius:8px;padding:10px;text-align:center}
.mstl{font-size:11px;color:var(--dim);display:block;margin-bottom:3px}
.mstv{font-size:14px;font-weight:700;color:#fff;display:block}
.qbox{text-align:center;padding:14px;margin-top:8px}
.qt{font-size:13px;color:rgba(224,224,255,.4);font-style:italic;line-height:1.7}
.bgrp{display:flex;gap:10px;margin-top:8px}
.bgrp .btn{margin-bottom:0}

/* toast */
.toast-el{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,255,204,.12);border:1px solid rgba(0,255,204,.35);color:#00ffcc;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;pointer-events:none;white-space:nowrap}
</style>
</head>
<body>
<div class="wrap">

<!-- ======== 首页 ======== -->
<div class="page on" id="pg-home">
  <div class="home-inner">
    <div class="home-logo">🏢</div>
    <div class="home-title glitch">AI寒冬裁员生存模拟器</div>
    <div class="home-sub neon">15天求生挑战</div>
    <div class="home-desc">202X年，AI浪潮席卷互联网<br>你能在15天裁员周期中活下来吗？</div>
    <div class="home-badges">
      <span>文字冒险</span><span>属性养成</span><span>多结局</span><span>AI表演</span>
    </div>
    <div class="home-btns">
      <button class="btn bp" id="btn-start">🚀 开始模拟</button>
      <button class="btn bg-" id="btn-continue" style="display:none">💾 继续上次</button>
    </div>
    <div class="home-footer">职场互动模拟工具，仅供学习交流<br>如有雷同，纯属巧合</div>
  </div>
</div>

<!-- ======== 角色创建 ======== -->
<div class="page" id="pg-create">
  <div style="padding:14px 14px 100px">
    <div class="ph">
      <span class="pt">⚙️ 角色配置</span>
      <span class="ps">初始化你的打工人档案</span>
    </div>
    <div class="card" style="background:rgba(255,51,102,.06);border-color:rgba(255,51,102,.25)">
      <div style="font-size:13px;color:var(--dim);line-height:1.8">
        ⚡ 你只有 <span style="color:#ff3366;font-weight:700;font-size:15px">15点</span> 分配给学历、出身和天赋<br>
        🔥 每一个选择都有代价，请仔细权衡
      </div>
    </div>
    <div class="ptbar">
      <span class="ptlbl">剩余点数</span>
      <span class="ptval neon" id="pts-val">15</span>
      <span class="ptunit">pt</span>
    </div>
    <div class="card" id="birth-sec"></div>
    <div class="card" id="talent-sec"></div>
    <div class="card">
      <div class="stitle"><span class="si">📊</span><span class="sl">初始属性预览</span></div>
      <div id="attr-preview"></div>
    </div>
    <button class="btn bx" id="btn-confirm" style="margin-top:4px">⚠️ 请完成所有选择</button>
  </div>
</div>

<!-- ======== 游戏主界面 ======== -->
<div class="page" id="pg-game">
  <div class="sbar">
    <div class="dinfo">
      <span class="dlbl">第</span>
      <span class="dnum" id="g-day">1</span>
      <span class="dlbl">天</span>
      <span class="dsl">&nbsp;/15</span>
    </div>
    <div class="sbadge sm" id="g-slot">
      <span id="g-slot-em">🌅</span>
      <span class="sn" id="g-slot-nm">上午</span>
    </div>
    <div style="display:flex;gap:6px">
      <div class="sbtn" id="btn-restart" title="重开">🔄</div>
      <div class="sbtn" id="btn-save" title="保存">💾</div>
    </div>
  </div>
  <div class="card" style="padding:12px 14px">
    <div class="agrid" id="attr-grid"></div>
  </div>
  <div id="warn-box"></div>
  <div class="brow" id="badge-row"></div>
  <div id="action-area">
    <div class="atip">
      <span class="atxt">选择一个行动</span>
      <span class="asub" id="act-sub">🌅 上午时段</span>
    </div>
    <div class="ctabs" id="cat-tabs"></div>
    <div class="alist" id="act-list"></div>
  </div>
</div>

<!-- ======== 事件弹层 ======== -->
<div class="overlay" id="ov-event" style="display:none">
  <div class="ov-inner">
    <div class="ov-card fi" id="ev-card"></div>
  </div>
</div>

<!-- ======== 结果弹层 ======== -->
<div class="overlay" id="ov-result" style="display:none">
  <div class="ov-inner">
    <div class="ov-card fi" id="res-card"></div>
  </div>
</div>

<!-- ======== 结局页 ======== -->
<div class="page" id="pg-result">
  <div class="rdeco">▓▓▓ GAME OVER ▓▓▓</div>
  <div style="text-align:center" id="re-typewrap"></div>
  <div class="remain">
    <span class="rebig" id="re-emoji">🏆</span>
    <span class="retitle" id="re-title"></span>
  </div>
  <div class="card">
    <span class="redes" id="re-desc"></span>
    <div class="divider"></div>
    <span class="resub" id="re-sub"></span>

  });

  el.classList.add('on');
  el.style.display = (id === 'pg-home') ? 'flex' : 'block';

}

function toast(msg){
  var el = document.createElement('div');
  el.className = 'toast-el';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); }, 1600);
}

function initCreate(){

  renderBirth();
  renderTalents();
  syncPts();       // 修复：重开时立刻刷新点数显示，避免残留上一局的值
  updatePreview();
  checkCanStart();
}

function renderBirth(){
  function group(title, opts, sel, type){
    return '<div class="tg">'
      +'<span class="gn">'+title+'</span>'
      +'<div class="tlist">'
      +opts.map(function(o){
        var cls = 'oi';
        if(sel===o.id) cls += ' sel';
        else if(pc.remain < o.cost) cls += ' dis';
        return '<div class="'+cls+'" data-type="'+type+'" data-id="'+o.id+'" data-cost="'+o.cost+'">'
          +'<div class="oh"><span class="on">'+o.em+' '+o.nm+'</span>'
          +'<span class="oc'+(o.cost===0?' free':'')+'">'+( o.cost>0 ? '-'+o.cost+'pt' : '免费')+'</span></div>'
          +'<span class="od">'+o.desc+'</span>'
          +'<span class="oe">'+o.eff+'</span>'
          +'</div>';
      }).join('')
      +'</div></div>';
  }
  var html = '<div class="stitle"><span class="si">🏷️</span><span class="sl">出身标签（每类必选1个）</span></div>'
    + group('📚 学历背景', EDU,    pc.edu,    'edu')
    + group('💼 职场出身', CAREER, pc.career, 'career')
    + group('🏠 家庭背景', FAMILY, pc.family, 'family');
  document.getElementById('birth-sec').innerHTML = html;
  document.querySelectorAll('#birth-sec .oi').forEach(function(el){
    el.addEventListener('click', function(){
      if(this.classList.contains('dis')) return;
      var type = this.getAttribute('data-type');
      var id   = this.getAttribute('data-id');
      var cost = parseInt(this.getAttribute('data-cost'));
      var opts = type==='edu' ? EDU : type==='career' ? CAREER : FAMILY;
      var prev = pc[type];
      var prevCost = prev ? (opts.find(function(o){return o.id===prev;})||{cost:0}).cost : 0;
      var diff = cost - prevCost;
      if(pc.remain - diff < 0){ toast('点数不足！'); return; }
      pc[type] = id; pc.remain -= diff;
      renderBirth(); renderTalents(); syncPts(); updatePreview(); checkCanStart();
    });
  });
}

function renderTalents(){
  var html = '<div class="stitle"><span class="si">⚡</span><span class="sl">天赋标签（每类可选1-2个）</span></div>';
  Object.keys(TALENTS).forEach(function(catId){
    var cat = TALENTS[catId];
    var selInCat = pc.talents.filter(function(t){ return cat.items.some(function(i){return i.id===t;}); });
    html += '<div class="tg" style="margin-bottom:14px">'
      +'<span class="gn">'+cat.lb+' · 已选'+selInCat.length+'/'+cat.max+'</span>'
      +'<div class="tgrid">'
      +cat.items.map(function(t){
        var sel = pc.talents.indexOf(t.id)>-1;
        var dis = !sel && pc.remain < t.cost;
        return '<div class="ti'+(sel?' sel':'')+(dis?' dis':'')+'" data-catid="'+catId+'" data-id="'+t.id+'" data-cost="'+t.cost+'">'
          +'<span class="te">'+t.em+'</span>'
          +'<span class="tn">'+t.nm+'</span>'
          +'<span class="tco">-'+t.cost+'pt</span>'
          +'<span class="tef">'+t.eff+'</span>'
          +'</div>';
      }).join('')
      +'</div></div>';
  });
  document.getElementById('talent-sec').innerHTML = html;
  document.querySelectorAll('#talent-sec .ti').forEach(function(el){
    el.addEventListener('click', function(){
      if(this.classList.contains('dis')) return;
      var catId = this.getAttribute('data-catid');
      var id    = this.getAttribute('data-id');
      var cost  = parseInt(this.getAttribute('data-cost'));
      var cat   = TALENTS[catId];
      var selInCat = pc.talents.filter(function(t){ return cat.items.some(function(i){return i.id===t;}); });
      var idx = pc.talents.indexOf(id);
      if(idx > -1){
        pc.talents.splice(idx,1); pc.remain += cost;
      } else {
        if(selInCat.length >= cat.max){ toast('该分类最多选'+cat.max+'个！'); return; }
        if(pc.remain < cost){ toast('点数不足！'); return; }
        pc.talents.push(id); pc.remain -= cost;
      }
      renderTalents(); syncPts(); updatePreview(); checkCanStart();
    });
  });
}

function syncPts(){
  var el = document.getElementById('pts-val');
  el.textContent = pc.remain;
  el.style.color = pc.remain<=2 ? '#ff3366' : '#00ffcc';
  el.style.textShadow = pc.remain<=2 ? '0 0 8px #ff3366' : '0 0 8px #00ffcc';
}

function calcSpent(){
  var s = 0;
  if(pc.edu)    s += (EDU.find(function(o){return o.id===pc.edu;})||{cost:0}).cost;
  if(pc.career) s += (CAREER.find(function(o){return o.id===pc.career;})||{cost:0}).cost;
  if(pc.family) s += (FAMILY.find(function(o){return o.id===pc.family;})||{cost:0}).cost;
  pc.talents.forEach(function(tid){ s += (ALL_TALENTS.find(function(t){return t.id===tid;})||{cost:0}).cost; });
  return s;
}

function calcInitAttrs(){
  // 基础值全面压低，让玩家一开始就很紧张
  var base = {leaderLike:30,output:30,physique:45,mental:40,social:30,antiAI:15,salary:20};
  var eduO   = EDU.find(function(o){return o.id===pc.edu;});
  var carO   = CAREER.find(function(o){return o.id===pc.career;});
  var famO   = FAMILY.find(function(o){return o.id===pc.family;});
  if(eduO){ base.salary = eduO.sal || 25; }
  if(carO){ base.salary += carO.salmod||0; }
  if(famO){ base.salary += famO.salmod||0; }
  function apply(o){ if(!o||!o.attrs) return; Object.keys(o.attrs).forEach(function(k){ if(base[k]!==undefined) base[k]=clamp(base[k]+o.attrs[k]); }); }
  apply(eduO); apply(carO); apply(famO);
  base.salary = Math.max(12, Math.min(80, base.salary));
  return base;
}

function updatePreview(){
  var attrs = calcInitAttrs();
  document.getElementById('attr-preview').innerHTML = ATTRS.map(function(c){
    var v = attrs[c.k]||0;
    return '<div class="ar">'
      +'<span class="al">'+c.ic+' '+c.lb+'</span>'
      +'<div class="pbar"><div class="pfill" style="width:'+Math.min(v,100)+'%;background:'+c.cl+'"></div></div>'
      +'<span class="av" style="color:'+c.cl+'">'+(c.money ? v+'K' : v)+'</span>'
      +'</div>';
  }).join('');
}

function checkCanStart(){

function initGame(attrs){
  gs = {
    day:1, slot:0,
    p: Object.assign({}, attrs, {
      talents: pc.talents.slice(),
      resumeCnt:0, examCnt:0, aiSucc:0, aiFail:0,
      labels:[], buffs:{}, unionDone:false, jobhopDone:false,
      edu: pc.edu, career: pc.career, family: pc.family
    }),
    log:[], over:false, endingId:null,
    evHistory:[], pendFixed:null, pendRand:null
  };
  gs.pendFixed = checkFixed();
  save();
}

function mod(attr, delta, mult){
  mult = mult||1;
  var p = gs.p;
  var v = p[attr]||0;
  var adj = delta < 0 ? Math.round(delta*mult) : delta;
  p[attr] = clamp(v + adj);
  return p[attr] - v;
}

function applyFx(fx, mult){
  mult = mult||1;
  var changes = [];
  Object.keys(fx).forEach(function(k){
    var v = fx[k];
    if(typeof v !== 'number' || v===0) return;
    if(!ALBL[k]) return;
    var actual = mod(k, v, mult);
    if(actual !== 0) changes.push({k:k, d:actual});
  });
  return changes;
}

function dailyDecay(){
  var p = gs.p;
  // 每日基础衰减（比之前略收窄，但保持一定压力）
  var decay = {leaderLike:-4, output:-5, salary:-1};
  // 低状态时有额外惩罚，但有上限，不会一回合暴死
  if(p.physique < 25) decay.mental  = (decay.mental||0)  - 3;  // 体质差→心情下降
  if(p.mental < 25)   decay.output  = (decay.output||0)  - 3;  // 心情差→产出下降
  if(p.leaderLike < 30 && !p.buffs.alliance)
                      decay.leaderLike = (decay.leaderLike||0) - 2; // 好感低→雪球但温和
  // 每次衰减单个值不超过-10，避免单回合暴死
  Object.keys(decay).forEach(function(k){
    if(decay[k] < -10) decay[k] = -10;
  });
  applyFx(decay, 1);
  // Buff 倒计时
  Object.keys(p.buffs).forEach(function(k){
    if(typeof p.buffs[k]==='number' && p.buffs[k]>0){
      p.buffs[k]--;
      if(p.buffs[k]<=0) delete p.buffs[k];
    }
  });
}

function checkDeath(){
  var p = gs.p;
  // ① 体质归零 → 过劳猝死
  if(p.physique <= 0) return 'overwork';
  // ② 心情归零 → 精神崩溃（发疯）
  if(p.mental <= 0) return 'burnout';
  // ③ 对抗AI值归零 → 直接被AI完全替代（无论第几天）
  if(p.antiAI <= 0 && !p.buffs.alliance) return 'replaced';
  // ④ 对抗AI值过低（第8天后）→ 被裁
  if(p.antiAI < 10 && gs.day >= 8 && !p.buffs.alliance) return 'fired';
  // ⑤ 领导满意度过低 → 被裁
  if(p.leaderLike < 20 && !p.buffs.alliance) return 'fired';
  // ⑥ 产出过低 → 被裁
  if(p.output < 20) return 'fired';
  // ⑦ 薪资归零 → 穷走
  if(p.salary <= 5) return 'poorpay';
  return null;
}

function getWarnings(){
  var p = gs.p, w = [];
  // 领导满意度（死亡线20）：3级预警
  if(p.leaderLike < 22 && !p.buffs.alliance)
    w.push('🚨 【即将被裁！】领导满意度触底，下一步可能被叫去小会议室');
  else if(p.leaderLike < 32 && !p.buffs.alliance)
    w.push('⚠️ 领导满意度告急，再跌就要被裁了');
  else if(p.leaderLike < 40)
    w.push('📉 领导满意度偏低，注意维护关系');
  // 个人产出（死亡线20）：2级预警
  if(p.output < 22)
    w.push('🚨 【即将被裁！】产出极低，已被列为裁员重点对象');
  else if(p.output < 30)
    w.push('⚠️ 产出值告急，继续下降将触发裁员');
  // 对抗AI值（第6天后死亡线10）：2级预警
  if(gs.day >= 5){
    if(p.antiAI < 12 && !p.buffs.alliance)
      w.push('🚨 【即将被裁！】对抗AI值极低，AI已经可以完全替代你');
    else if(p.antiAI < 20)
      w.push('⚠️ 对抗AI值危险，你正在变成最容易被替代的人');
  }
  // 体质（死亡线0）：2级预警
  if(p.physique < 10)
    w.push('🚨 【濒死预警】体质极度低下，下次加班可能直接倒下');
  else if(p.physique < 22)
    w.push('💀 体质危险，过劳猝死风险极高');
  // 心情（死亡线0）：2级预警
  if(p.mental < 10)
    w.push('🚨 【崩溃预警】心情极度低落，精神已在崩溃边缘');
  else if(p.mental < 20)
    w.push('😰 心理健康告急，再扛下去要垮');
  // 薪资（死亡线5）
  if(p.salary <= 6)
    w.push('💸 【薪资告急】月薪已逼近生存底线');
  return w;
}

function aiRisk(base){
  var r = base;
  if(hasTalent('t_aistar')) r *= 0.2;
  if(hasTalent('t_fake'))   r = 0;
  if(gs.p.labels.indexOf('AI骗子')>-1) r *= 2;
  if(hasTalent('t_lucky'))  r *= 0.5;
  return Math.min(r, 1);
}

function getBaseRisk(base){
  var r = base;
  if(hasTalent('t_lucky')) r *= 0.5;
  return Math.min(r, 1);
}

function checkFixed(){
  var slot = SLOTS[gs.slot];
  for(var i=0;i<FIXED.length;i++){
    var e = FIXED[i];
    if(e.day===gs.day && e.slot===slot && gs.evHistory.indexOf(e.id)<0) return e;
  }
  return null;
}

function drawRandom(){
  var p = gs.p;
  var avail = RANDEVS.filter(function(e){
    if(gs.evHistory.indexOf(e.id) > -1) return false;
    // 出身专属事件：检查 edu/career/family 约束
    if(e.eduReq    && e.eduReq.indexOf(p.edu)     < 0) return false;
    if(e.careerReq && e.careerReq.indexOf(p.career)< 0) return false;
    if(e.familyReq && e.familyReq.indexOf(p.family)< 0) return false;
    return true;
  });
  if(!avail.length) return null;
  // 出身专属事件的权重稍高（2倍），让初始选择影响更明显
  var pool = [];
  avail.forEach(function(e){
    var w = (e.eduReq||e.careerReq||e.familyReq) ? 2 : 1;
    for(var i=0;i<w;i++) pool.push(e);
  });
  return pool[Math.floor(Math.random()*pool.length)];
}

function triggerEnding(id){
  gs.over = true; gs.endingId = id; save();
}

function finalSettle(){
  if(gs.over) return;
  var p = gs.p;
  if(p.unionDone && p.social >= 90) return triggerEnding('union');
  if(p.jobhopDone) return triggerEnding('jobhop');
  if(p.antiAI < 20 && !p.buffs.alliance && !p.buffs.immune) return triggerEnding('fired');
  if(p.examCnt >= 10) return triggerEnding('govjob');
  if(p.antiAI >= 90 && p.output >= 80 && p.leaderLike >= 70) return triggerEnding('aiwinner');
  if(p.aiSucc >= 5 && p.aiFail === 0) return triggerEnding('aiwinner');
  if(p.antiAI >= 50 && p.leaderLike >= 80) return triggerEnding('aimanager');
  triggerEnding('survived');
}

function handleSpecial(sp, logs){
  var p = gs.p;
  if(sp==='resume'){
    p.resumeCnt++;
    if(p.resumeCnt>=5){ p.jobhopDone=true; logs.push('📄 简历更新5次！跳槽机会来了！'); }
  } else if(sp==='exam'){
    p.examCnt += hasTalent('t_exam') ? 2 : 1;
    if(p.examCnt>=10) logs.push('📚 刷题达到10次！公考上岸有望！');
  } else if(sp==='resign'){
    triggerEnding('resign');
  } else if(sp==='alliance'){
    p.buffs.alliance = true; logs.push('🤝 与领导建立同盟！低满意度也不会被裁！');
  } else if(sp==='union'){
    p.unionDone = true; logs.push('⚖️ 集体反杀路线已解锁！');
  } else if(sp==='immBuff'){
    p.buffs.immune = 3; logs.push('🛡️ 获得3天免裁Buff！');
  } else if(sp==='startup'){
    p.resumeCnt++; logs.push('🤝 与被裁同学建立联系');
  }
}

function checkAIMilestone(){
  var p = gs.p;
  if(p.aiSucc >= 3 && p.labels.indexOf('AI红人')<0){
    p.labels.push('AI红人'); toast('🏷️ 解锁「AI红人」标签！AI表演收益+20%');
  }
  if(p.aiSucc >= 5 && p.aiFail === 0){
    p.buffs.immune = true;
    mod('leaderLike',30); mod('social',20); mod('antiAI',20);
    triggerEnding('aiwinner');
  }
  if(p.aiFail >= 2 && p.labels.indexOf('AI骗子')<0){
    p.labels.push('AI骗子'); toast('🏷️ 你获得了「AI骗子」标签，AI表演风险翻倍！');
  }
}

function execAction(actionId){
  var action = null;
  var catKeys = Object.keys(ACTIONS);
  for(var i=0;i<catKeys.length;i++){
    var found = ACTIONS[catKeys[i]].items.filter(function(a){return a.id===actionId;});
    if(found.length){ action=found[0]; break; }
  }
  if(!action) return null;
  var p = gs.p;
  var result = {action:action, changes:[], riskHit:false, riskDesc:'', logs:[]};
  var fx = Object.assign({}, action.fx);
  // 天赋加成
  if(action.ai && hasTalent('t_aistar')){
    Object.keys(fx).forEach(function(k){ if(fx[k]>0) fx[k]=Math.round(fx[k]*1.3); });
  }
  if(hasTalent('t_ai') && fx.antiAI > 0) fx.antiAI = Math.round(fx.antiAI*1.5);
  if(hasTalent('t_iron') && fx.mental < 0) fx.mental = Math.round(fx.mental*0.5);
  if(hasTalent('t_roll') && fx.physique < 0 && action.id==='w3') fx.physique = Math.round(fx.physique*0.5);
  if(hasTalent('t_horse') && action.id.charAt(0)==='w' && fx.output>0) fx.output = Math.round(fx.output*1.15);
  if(hasTalent('t_social') && fx.social > 0) fx.social = Math.round(fx.social*2);
  if(hasTalent('t_sales')){
    Object.keys(fx).forEach(function(k){ if(fx[k]>0) fx[k]=Math.round(fx[k]*1.2); });
  }
  result.changes = applyFx(fx);
  if(action.sp) handleSpecial(action.sp, result.logs);
  if(action.risk && !gs.over){
    var rp = action.ai ? aiRisk(action.risk.p) : getBaseRisk(action.risk.p);
    if(Math.random() < rp){
      result.riskHit = true; result.riskDesc = action.risk.d;
      if(action.rfx) applyFx(action.rfx);
    }
  }
  if(action.ai){
    if(!result.riskHit) p.aiSucc++;
    else p.aiFail++;
    checkAIMilestone();
    if(!result.riskHit && hasTalent('t_manage')){
      mod('leaderLike',5); p.buffs.immune = (p.buffs.immune||0)+1;
    }
  }
  var dead = checkDeath();
  if(dead && !gs.over) triggerEnding(dead);
  return result;
}

function resolveEvOpt(event, idx){
  var opt = event.opts[idx]; if(!opt) return null;
  var p = gs.p;
  var result = {opt:opt, changes:[], riskHit:false, riskDesc:'', logs:[]};
  if(opt.fx && Object.keys(opt.fx).length>0) result.changes = applyFx(opt.fx);
  if(opt.sp) handleSpecial(opt.sp, result.logs);
  if(opt.risk && !gs.over){
    var rp = opt.ai ? aiRisk(opt.risk.p) : getBaseRisk(opt.risk.p);
    if(Math.random() < rp){
      result.riskHit = true; result.riskDesc = opt.risk.d;
      if(opt.rfx) applyFx(opt.rfx);
    }
  }
  if(opt.ai){
    if(!result.riskHit) p.aiSucc++;
    else p.aiFail++;
    checkAIMilestone();
  }
  gs.evHistory.push(event.id);
  gs.pendFixed = null; gs.pendRand = null;
  var dead = checkDeath();
  if(dead && !gs.over) triggerEnding(dead);
  return result;
}

function advanceSlot(){
  gs.slot++;
  if(gs.slot >= 2){
    gs.slot = 0;
    if(gs.day >= 15){ finalSettle(); return; }
    dailyDecay();
    gs.day++;
    var dead = checkDeath();
    if(dead && !gs.over){ triggerEnding(dead); return; }
  }
  gs.pendFixed = checkFixed();
  if(!gs.pendFixed && Math.random() < 0.35){
    gs.pendRand = drawRandom();
  } else {
    gs.pendRand = null;
  }
}

function getAvailActions(){
  var slot = SLOTS[gs.slot];
  return Object.keys(ACTIONS).map(function(catId){
    var cat = ACTIONS[catId];
    var items = cat.items.filter(function(a){
      return !a.slots || a.slots.indexOf(slot)>-1;
    });
    return {catId:catId, lb:cat.lb, cl:cat.cl, items:items};
  }).filter(function(c){ return c.items.length>0; });
}

function syncUI(){
  if(!gs) return;
  var p = gs.p;
  document.getElementById('g-day').textContent = gs.day;
  var slot = SLOTS[gs.slot];
  var sb = document.getElementById('g-slot');
  sb.className = 'sbadge ' + SBCLS[slot];
  document.getElementById('g-slot-em').textContent = SEM[slot];
  document.getElementById('g-slot-nm').textContent = SNAME[slot];
  renderAttrGrid();
  // 警告
  var warns = getWarnings();
  document.getElementById('warn-box').innerHTML = warns.map(function(w){
    return '<div class="wi pulse">'+w+'</div>';
  }).join('');
  // 徽章
  var badges = '';
  (p.labels||[]).forEach(function(lb){ badges += '<span class="tag '+(lb==='AI红人'?'tc':'tr')+'">'+lb+'</span>'; });
  if(p.buffs.immune > 0) badges += '<span class="tag ty">🛡️ 免裁'+p.buffs.immune+'天</span>';
  if(p.buffs.alliance)   badges += '<span class="tag tc">🤝 领导同盟</span>';
  document.getElementById('badge-row').innerHTML = badges;
  // 游戏结束
  if(gs.over){
    document.getElementById('action-area').style.display='none';
    document.getElementById('ov-event').style.display='none';
    document.getElementById('ov-result').style.display='none';
    setTimeout(function(){ goResult(); }, 800);
    return;
  }
  // 事件
  if(gs.pendFixed){ showEvent(gs.pendFixed); return; }
  if(gs.pendRand){  showEvent(gs.pendRand);  return; }
  document.getElementById('ov-event').style.display='none';
  document.getElementById('action-area').style.display='block';
  buildActionUI();
}

function renderAttrGrid(){
  var p = gs.p;
  document.getElementById('attr-grid').innerHTML = ATTRS.map(function(c){
    var v = p[c.k]||0;
    var warn = v < c.min;
    return '<div class="arow'+(warn?' warn':'')+'">'
      +'<span class="aicon">'+c.ic+'</span>'
      +'<span class="aname">'+c.lb+'</span>'
      +'<div class="pbar"><div class="pfill" style="width:'+Math.min(v,100)+'%;background:'+c.cl+'"></div></div>'
      +'<span class="anum" style="color:'+c.cl+'">'+(c.money ? v+'K' : v)+'</span>'
      +'</div>';
  }).join('');
}

function showEvent(event){
  document.getElementById('action-area').style.display='none';
  document.getElementById('ov-result').style.display='none';
  var optsHtml = '';
  if(!event.final){
    optsHtml = '<div class="evopts">'
      +(event.opts||[]).map(function(o,i){
        // 选前不显示fx数值，只显示文字和风险提示
        var rk = o.risk ? '<span class="evork">⚡ '+o.risk.d+'</span>' : '';
        return '<div class="evopt" data-idx="'+i+'">'
          +'<span class="evoem">'+(o.em||'▶')+'</span>'
          +'<div class="evoc">'
          +'<span class="evotxt">'+o.tx+'</span>'
          +rk
          +'</div></div>';
      }).join('')
      +'</div>';
  } else {
    optsHtml = '<button class="btn bp" style="margin-top:14px" id="btn-final">查看最终结局 →</button>';
  }
  document.getElementById('ev-card').innerHTML =
    '<div class="evhd">'
    +'<span class="evt">'+event.title+'</span>'
    +'<span class="evtag '+(event.fixed?'evf':'evr')+'">'+(event.fixed?'📌 剧情':'🎲 随机')+'</span>'
    +'</div>'
    +'<div class="divider"></div>'
    +'<span class="evdesc">'+event.desc+'</span>'
    +optsHtml;
  document.getElementById('ov-event').style.display='flex';
  // 绑定选项
  document.querySelectorAll('#ev-card .evopt').forEach(function(el){
    el.addEventListener('click', function(){
      var idx = parseInt(this.getAttribute('data-idx'));
      onEvOpt(idx);
    });
  });
  // 绑定最终结局按钮
  var bf = document.getElementById('btn-final');
  if(bf) bf.addEventListener('click', function(){ doFinalSettle(); });
}

function onEvOpt(idx){
  var event = gs.pendFixed || gs.pendRand; if(!event) return;
  var result = resolveEvOpt(event, idx); if(!result) return;
  save();
  showResultCard(
    '事件结果',
    (result.opt.em||'')+ ' '+ result.opt.tx,
    '',
    result.changes, result.riskHit, result.riskDesc, result.logs,
    false
  );
  renderAttrGrid();
}

function doFinalSettle(){
  finalSettle(); save();
  document.getElementById('ov-event').style.display='none';
  goResult();
}

function showResultCard(title, action, desc, changes, riskHit, riskDesc, logs, isAction){
  var effsHtml = changes.map(function(c){
    return '<div class="efc '+(c.d>0?'pos':'neg')+'">'
      +'<span class="efcl">'+(ALBL[c.k]||c.k)+'</span>'
      +'<span class="efcv">'+(c.d>0?'+':'')+c.d+'</span>'
      +'</div>';
  }).join('');
  var riskHtml = riskHit ? '<div class="riskalert">⚡ 风险触发：'+riskDesc+'</div>' : '';
  var logsHtml = logs.length ? '<div class="logbox">'+logs.map(function(l){ return '<span class="logitem">'+l+'</span>'; }).join('')+'</div>' : '';
  var descHtml = desc ? '<span class="resdesc">'+desc+'</span>' : '';
  document.getElementById('res-card').innerHTML =
    '<span class="restit">'+title+'</span>'
    +'<span class="resact">'+action+'</span>'
    +'<div class="divider"></div>'
    +descHtml
    +'<div class="effslist">'+(effsHtml||'<span style="color:var(--dim);font-size:13px">无属性变动</span>')+'</div>'
    +riskHtml+logsHtml
    +'<button class="btn bp" id="btn-res-cont" style="margin-top:4px">继续 →</button>';
  document.getElementById('ov-event').style.display='none';
  document.getElementById('ov-result').style.display='flex';
  document.getElementById('btn-res-cont').addEventListener('click', function(){
    document.getElementById('ov-result').style.display='none';
    if(gs.over){ goResult(); return; }
    advanceSlot(); save(); syncUI();
  });
}

function buildActionUI(){
  var cats = getAvailActions();
  if(!cats.find(function(c){return c.catId===curCat;})) curCat = cats[0]&&cats[0].catId||'work';
  var slot = SLOTS[gs.slot];
  document.getElementById('act-sub').textContent = SEM[slot]+' '+SNAME[slot]+'时段';
  document.getElementById('cat-tabs').innerHTML = cats.map(function(c){
    var on = c.catId===curCat;
    return '<div class="ctab'+(on?' on':'')+'" style="'+(on?'border-color:'+c.cl+';color:'+c.cl+';font-weight:700':'')+'" data-cat="'+c.catId+'">'+c.lb+'</div>';
  }).join('');
  document.querySelectorAll('#cat-tabs .ctab').forEach(function(el){
    el.addEventListener('click', function(){
      curCat = this.getAttribute('data-cat');
      buildActionUI();
    });
  });
  var cat = cats.find(function(c){return c.catId===curCat;}); if(!cat) return;
  document.getElementById('act-list').innerHTML = cat.items.map(function(a){
    // 不显示fx数值，只显示风险概率描述
    var rk = a.risk ? '<div class="risk">⚡ '+a.risk.d+'</div>' : '';
    var aib = a.ai ? '<span class="aibadge">AI表演</span>' : '';
    return '<div class="ait card" data-aid="'+a.id+'">'
      +'<div class="aih"><span class="aie">'+a.em+'</span><span class="ain">'+a.nm+'</span>'+aib+'</div>'
      +'<span class="aid">'+a.desc+'</span>'
      +rk
      +'</div>';
  }).join('');
  document.querySelectorAll('#act-list .ait').forEach(function(el){
    el.addEventListener('click', function(){
      var aid = this.getAttribute('data-aid');
      doAction(aid);
    });
  });
}

function doAction(actionId){
  var result = execAction(actionId); if(!result) return;
  save();
  var a = result.action;
  showResultCard(
    SEM[SLOTS[gs.slot]]+' '+SNAME[SLOTS[gs.slot]]+'行动',
    a.em+' '+a.nm,
    a.desc,
    result.changes, result.riskHit, result.riskDesc, result.logs,
    true
  );
  renderAttrGrid();
}

// ================================================================
// ========================== 结局页 ==============================
// ================================================================

function goResult(){
  renderResult(gs.endingId||'survived');
  showPage('pg-result');
}

function renderResult(eid){
  var e = ENDINGS[eid] || ENDINGS.survived;
  var p = gs.p;
  var typeCls = {fail:'ef',normal:'en2',perfect:'ep2',hidden:'eh'}[e.type]||'en2';
  var typeLbl = {fail:'💀 生存失败',normal:'😮 普通通关',perfect:'🏆 完美通关',hidden:'🌟 隐藏结局'}[e.type]||'';
  document.getElementById('re-typewrap').innerHTML = '<span class="retag '+typeCls+'">'+typeLbl+'</span>';
  document.getElementById('re-emoji').textContent = e.emoji;
  document.getElementById('re-title').textContent = e.title;
  document.getElementById('re-desc').textContent = e.desc;
  document.getElementById('re-sub').textContent = e.sub;
  document.getElementById('re-quote').textContent = '「'+e.quote+'」';
  document.getElementById('re-stats').innerHTML = ATTRS.map(function(c){
    var v = p[c.k]||0;
    return '<div class="strow">'
      +'<span class="stic">'+c.ic+'</span>'
      +'<span class="stn">'+c.lb+'</span>'
      +'<div class="pbar"><div class="pfill" style="width:'+Math.min(v,100)+'%;background:'+c.cl+'"></div></div>'
      +'<span class="stv" style="color:'+c.cl+'">'+(c.money?v+'K':v)+'</span>'
      +'</div>';
  }).join('');
  // 成就
  var achs = calcAchs(p, eid);
  if(achs.length){
    document.getElementById('re-ach').style.display='block';
    document.getElementById('re-achlist').innerHTML = achs.map(function(a){
      return '<div class="acit"><span class="ace">'+a.em+'</span><div><span class="acn">'+a.nm+'</span><span class="acd">'+a.dc+'</span></div></div>';
    }).join('');
  } else {
    document.getElementById('re-ach').style.display='none';
  }
  // 小统计
  document.getElementById('re-mini').innerHTML = [
    {lb:'AI表演成功',vl:(p.aiSucc||0)+'次'},
    {lb:'AI表演翻车',vl:(p.aiFail||0)+'次'},
    {lb:'改简历次数',vl:(p.resumeCnt||0)+'次'},
    {lb:'考公刷题',  vl:(p.examCnt||0)+'次'},
    {lb:'游戏难度',  vl:{easy:'简单',normal:'普通',hard:'地狱'}[p.diff]||'普通'},
    {lb:'天赋标签',  vl:(p.talents||[]).map(function(id){ return (ALL_TALENTS.find(function(t){return t.id===id;})||{nm:'?'}).nm; }).join('/')||'无'}
  ].map(function(s){
    return '<div class="mst"><span class="mstl">'+s.lb+'</span><span class="mstv">'+s.vl+'</span></div>';
  }).join('');
}

function calcAchs(p, eid){
  var a = [];
  if((p.aiSucc||0)>=3 && (p.aiFail||0)===0) a.push({em:'🎭',nm:'AI表演封神',dc:'连续3次AI表演零翻车'});
  if((p.aiFail||0)>=3) a.push({em:'💩',nm:'翻车专家',dc:'AI表演翻车3次以上'});
  if((p.resumeCnt||0)>=5) a.push({em:'📄',nm:'简历更新狂魔',dc:'改了5次以上的简历'});
  if((p.examCnt||0)>=5) a.push({em:'📖',nm:'考公战士',dc:'刷题超过5次'});
  if((p.antiAI||0)>=80) a.push({em:'🤖',nm:'AI克星',dc:'对抗AI值超过80'});
  if((p.social||0)>=80) a.push({em:'🤝',nm:'人缘王者',dc:'同事好感度超过80'});
  if(eid==='aiwinner') a.push({em:'👑',nm:'最强打工人',dc:'达成完美通关结局'});
  if(eid==='union')    a.push({em:'✊',nm:'团结就是力量',dc:'触发集体反杀隐藏结局'});
  return a;
}

// ================================================================
// ========================== 初始化 ==============================
// ================================================================

document.addEventListener('DOMContentLoaded', function(){
  // 初始化：隐藏所有页面，显示首页
  document.querySelectorAll('.page').forEach(function(p){ p.style.display='none'; });
  var home = document.getElementById('pg-home');
  home.style.display = 'flex';
  home.classList.add('on');

  initHome();

  document.getElementById('btn-start').addEventListener('click', function(){
    clearSave(); showPage('pg-create'); initCreate();
  });
  document.getElementById('btn-continue').addEventListener('click', function(){
    if(loadSave()){ showPage('pg-game'); syncUI(); } else { clearSave(); showPage('pg-create'); initCreate(); }
  });
  document.getElementById('btn-confirm').addEventListener('click', function(){
    confirmCreate();
  });
  document.getElementById('btn-restart').addEventListener('click', function(){
    if(confirm('确定要重开吗？当前进度将丢失！')){ clearSave(); showPage('pg-home'); initHome(); }
  });
  document.getElementById('btn-save').addEventListener('click', function(){
    save(); toast('已保存 💾');
  });
  document.getElementById('btn-replay').addEventListener('click', function(){
    clearSave(); showPage('pg-home'); initHome();
  });
  document.getElementById('btn-share').addEventListener('click', function(){
    var p = gs&&gs.p; var eid = gs&&gs.endingId||'survived'; var e = ENDINGS[eid]||ENDINGS.survived;
    var txt = '我在《AI寒冬裁员生存模拟器》中达成了「'+e.title+'」结局！\n对抗AI值：'+(p&&p.antiAI||0)+' | 领导满意度：'+(p&&p.leaderLike||0)+'\n快来试试你能否在15天生存挑战中活下来！';
    if(navigator.clipboard){
      navigator.clipboard.writeText(txt).then(function(){ toast('结局文案已复制 📋'); }).catch(function(){ toast('分享：'+txt.slice(0,30)+'...'); });
    } else { toast('分享：'+txt.slice(0,30)+'...'); }
  });
});

})();
</script>
